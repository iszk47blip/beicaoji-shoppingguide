<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焙草集 AI 健康顾问</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  header { background: #5B8C5A; color: white; padding: 20rpx; text-align: center; font-size: 18px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; word-break: break-word; }
  .msg.bot { align-self: flex-start; background: white; color: #333; }
  .msg.user { align-self: flex-end; background: #5B8C5A; color: white; }
  .msg.system { align-self: center; background: #e8f5e9; color: #5B8C5A; font-size: 13px; text-align: center; max-width: 90%; }
  #input-bar { display: flex; padding: 12px 16px; background: white; border-top: 1px solid #eee; gap: 10px; }
  #input-bar input { flex: 1; height: 44px; padding: 0 16px; border: 1px solid #ddd; border-radius: 22px; font-size: 15px; outline: none; }
  #input-bar input:focus { border-color: #5B8C5A; }
  #send-btn { padding: 0 24px; height: 44px; background: #5B8C5A; color: white; border: none; border-radius: 22px; font-size: 15px; cursor: pointer; }
  #send-btn:disabled { background: #aaa; }
  .loading { text-align: center; color: #999; padding: 10px; font-size: 13px; }
  .rec-section { background: #e8f5e9; border-radius: 12px; padding: 16px; margin-top: 8px; }
  .rec-section h4 { color: #5B8C5A; margin-bottom: 8px; font-size: 14px; }
  .rec-item { background: white; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .rec-item .name { font-weight: bold; color: #333; font-size: 14px; }
  .rec-item .info { font-size: 12px; color: #999; margin-top: 4px; }
  .rec-item .price { color: #e6a23c; font-size: 14px; margin-top: 4px; }
</style>
</head>
<body>
<header>🌿 焙草集 AI 健康顾问</header>
<div id="chat"></div>
<div id="input-bar">
  <input id="msg-input" placeholder="输入你的情况..." />
  <button id="send-btn">发送</button>
</div>

<script>
const BASE = 'http://localhost:8005/api';
const sessionId = 'html-test-' + Date.now();

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'system') {
    div.textContent = text;
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showRecommendation(rec) {
  if (!rec) return;
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot rec-section';
  let html = '<h4>🌿 推荐套餐</h4>';
  html += '<p><strong>体质：</strong>' + rec.constitution.constitution_type + '</p>';
  html += '<p style="font-size:13px;color:#666;margin-top:4px">' + rec.constitution.description + '</p>';
  if (rec.bundle && rec.bundle.length > 0) {
    html += '<div style="margin-top:10px">';
    rec.bundle.forEach(p => {
      html += '<div class="rec-item">';
      html += '<div class="name">' + p.name + '</div>';
      html += '<div class="info">成分：' + p.ingredients + '</div>';
      html += '<div class="price">¥' + (p.price || 0) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<p style="font-size:11px;color:#999;margin-top:8px">' + rec.constitution.disclaimer + '</p>';
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMsg('user', text);
  btn.disabled = true;

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.textContent = '思考中...';
  document.getElementById('chat').appendChild(loading);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

  try {
    const resp = await fetch(BASE + '/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text })
    });
    const data = await resp.json();
    loading.remove();
    addMsg('bot', data.message);
    if (data.recommendation) {
      showRecommendation(data.recommendation);
    }
  } catch (e) {
    loading.remove();
    addMsg('system', '请求失败: ' + e.message);
  }

  btn.disabled = false;
  input.focus();
}

document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

// Start conversation
addMsg('bot', '🌿 正在连接焙草集 AI 健康顾问...');
fetch(BASE + '/chat/send', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ session_id: sessionId, message: '' })
}).then(r => r.json()).then(data => {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  addMsg('bot', data.message);
});
</script>
</body>
</html>
