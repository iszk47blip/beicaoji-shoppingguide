<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>焙草集 AI 健康顾问</title>
<style>
  :root {
    --green: #5B8C5A;
    --green-light: #e8f5e9;
    --bg: #f0f2f0;
    --white: #ffffff;
    --text: #333333;
    --text-secondary: #999999;
    --border: #e8e8e8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --safe-bottom: env(safe-area-inset-bottom, 12px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    -webkit-overflow-scrolling: touch;
    touch-action: manipulation;
    user-select: none;
  }

  /* ---- Header ---- */
  header {
    background: var(--green);
    color: white;
    padding: 12px 16px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
    padding-top: max(12px, env(safe-area-inset-top));
  }

  /* ---- Main layout ---- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ---- Chat area ---- */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
    word-break: break-word;
    animation: msgIn 0.25s ease-out;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.bot {
    align-self: flex-start;
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .msg.user {
    align-self: flex-end;
    background: var(--green);
    color: white;
    border-bottom-right-radius: 6px;
  }
  .msg.system {
    align-self: center;
    background: var(--green-light);
    color: var(--green);
    font-size: 12px;
    text-align: center;
    max-width: 92%;
    border-radius: 10px;
    padding: 8px 14px;
  }

  /* ---- Typing indicator ---- */
  .typing { display: flex; gap: 4px; padding: 14px 18px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ---- Quick replies ---- */
  #quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 6px 14px 0;
    flex-shrink: 0;
    min-height: 0;
  }
  #quick-replies:empty { display: none; }

  .quick-btn {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--green);
    padding: 9px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .quick-btn:active {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  /* ---- Input bar ---- */
  #input-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 16px;
    background: var(--white);
    border-top: 0.5px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.05);
    padding-bottom: max(16px, var(--safe-bottom));
  }

  #input-bar input {
    flex: 1;
    height: 44px;
    padding: 0 20px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 24px;
    font-size: 15px;
    outline: none;
    background: #f7f8f7;
    color: var(--text);
    min-width: 0;
    transition: all 0.2s;
  }
  #input-bar input:focus {
    border-color: var(--green);
    background: white;
    box-shadow: 0 0 0 4px rgba(91,140,90,0.08);
  }

  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #5B8C5A, #4a7a49);
    color: white;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(91,140,90,0.3);
  }
  .icon-btn:active { transform: scale(0.92); box-shadow: 0 1px 4px rgba(91,140,90,0.2); }

  #mic-btn { display: none; }

  /* Voice overlay — hidden */
  #voice-overlay { display: none !important; }

  /* ---- Report button ---- */
  .report-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #5B8C5A, #7CB342);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 12px rgba(91,140,90,0.25);
    margin-top: 8px;
  }
  .report-btn:active { opacity: 0.9; transform: scale(0.98); }

  /* ---- Stepper ---- */
  .stepper {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .stepper-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    background: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
    color: #666;
    -webkit-tap-highlight-color: transparent;
  }
  .stepper-btn:active { border-color: var(--green); color: var(--green); }
  .stepper-btn.plus {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .stepper-btn.plus:active { opacity: 0.8; }
  .stepper-btn:disabled {
    opacity: 0.3; cursor: default; pointer-events: none;
  }
  .stepper-qty {
    min-width: 22px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: #333;
  }

  /* ---- Cart bar (floating bottom) ---- */
  #cart-bar {
    display: none;
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--green);
    color: #faf7f2;
    padding: 14px 20px;
    z-index: 50;
    cursor: pointer;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 -4px 16px rgba(45,125,70,0.25);
    transition: transform 0.3s ease;
  }
  #cart-bar.show { display: flex; animation: slideUp 0.3s ease; }
  #cart-bar.panel-open { display: none !important; }
  @keyframes slideUp { from { transform: translateX(-50%) translateY(100%); } to { transform: translateX(-50%) translateY(0); } }
  #cart-bar .cart-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #cart-bar .cart-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #cart-bar .cart-icon svg { width: 20px; height: 20px; }
  #cart-bar .cart-count-badge {
    position: absolute;
    top: -4px; right: -4px;
    min-width: 18px; height: 18px;
    border-radius: 9px;
    background: #e74c3c;
    color: white;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  #cart-bar .cart-total {
    font-size: 17px;
    font-weight: 700;
  }
  #cart-bar .cart-arrow {
    font-size: 14px;
    opacity: 0.6;
  }

  /* ---- Overlay ---- */
  #cart-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 60;
    animation: fadeIn 0.2s;
  }
  #cart-overlay.show { display: block; }

  /* ---- Cart panel ---- */
  #cart-panel {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 480px;
    max-height: 65vh;
    background: white;
    border-radius: 20px 20px 0 0;
    z-index: 70;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #cart-panel.show { transform: translateX(-50%) translateY(0); }
  #cart-panel .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #cart-panel .panel-title {
    font-size: 17px;
    font-weight: 700;
  }
  #cart-panel .panel-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: #f5f5f5;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
  }
  #cart-panel .panel-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px;
    -webkit-overflow-scrolling: touch;
  }
  #cart-panel .panel-empty {
    text-align: center;
    padding: 48px 20px;
    color: #999;
    font-size: 14px;
  }
  #cart-panel .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  #cart-panel .cart-item:last-child { border-bottom: none; }
  #cart-panel .cart-item-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #cart-panel .cart-item-icon svg { width: 22px; height: 22px; }
  #cart-panel .cart-item-info { flex: 1; min-width: 0; }
  #cart-panel .cart-item-name {
    font-size: 14px; font-weight: 600; color: #333;
    margin-bottom: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  #cart-panel .cart-item-price { font-size: 13px; color: #c0392b; font-weight: 600; }
  #cart-panel .cart-item-del {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: #fef0f0;
    color: #e74c3c;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }
  #cart-panel .cart-item-del:active { opacity: 0.6; }
  #cart-panel .panel-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #cart-panel .btn-copy {
    flex: 1;
    padding: 13px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #cart-panel .btn-copy:active { opacity: 0.9; }
  #cart-panel .btn-clear {
    padding: 13px 20px;
    background: white;
    color: #999;
    border: 1px solid var(--border);
    border-radius: 24px;
    font-size: 13px;
    cursor: pointer;
  }
  #cart-panel .btn-checkout {
    flex: 2;
    padding: 13px;
    background: linear-gradient(135deg, #e6a23c, #f56c6c);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #cart-panel .btn-checkout:active { opacity: 0.9; }

  /* ---- Order modal ---- */
  #order-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
  }
  #order-overlay.show { display: flex; }
  #order-modal {
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    background: white;
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    padding: 24px 20px;
    animation: slideUp 0.3s ease;
  }
  #order-modal .order-header {
    text-align: center;
    margin-bottom: 20px;
  }
  #order-modal .order-check {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #e8f5e9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 12px;
  }
  #order-modal .order-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  #order-modal .order-no {
    font-size: 12px;
    color: #999;
  }
  #order-modal .order-section {
    background: #faf7f2;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  #order-modal .order-section-title {
    font-size: 13px;
    font-weight: 600;
    color: #999;
    margin-bottom: 8px;
  }
  #order-modal .order-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
  }
  #order-modal .order-total-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 0;
    border-top: 1px solid #e0d8cc;
    margin-top: 8px;
    font-size: 16px;
    font-weight: 700;
  }
  #order-modal .order-total-row .total-price {
    color: #c0392b;
  }
  #order-modal .order-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  #order-modal .btn-order-close {
    flex: 1;
    padding: 13px;
    background: #f5f5f5;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    cursor: pointer;
  }
  #order-modal .btn-order-confirm {
    flex: 2;
    padding: 13px;
    background: linear-gradient(135deg, #5B8C5A, #7CB342);
    color: white;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
  }

  /* ---- Action row (stepper + buy button) ---- */
  .rec-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ---- Quick buy button on product cards ---- */
  .rec-card .btn-buy-now {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--green);
    background: white;
    color: var(--green);
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .rec-card .btn-buy-now:active {
    background: var(--green);
    color: white;
  }

  /* ---- Toast ---- */
  #toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #3d3226;
    color: white;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- Responsive: narrow screen product cards ---- */
  @media (max-width: 480px) {
    .rec-card {
      flex-wrap: wrap;
    }
    .rec-card > :nth-child(2) {
      flex: 1 1 calc(100% - 68px);
      min-width: 80px;
    }
    .rec-actions {
      width: 100%;
      justify-content: flex-end;
      margin-top: 10px;
      padding-left: 56px;
    }
  }

  /* ---- Responsive: larger screens ---- */
  @media (min-width: 481px) {
    .app { box-shadow: var(--shadow); }
    #chat { padding: 16px 18px; }
    #input-bar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>焙草集 AI 健康顾问<button id="orders-btn" onclick="showOrders()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;display:none">📋 我的订单</button></header>

  <div id="chat"></div>

  <div id="quick-replies"></div>

  <div id="input-bar">
    <input id="msg-input" placeholder="说说你的情况..." autocomplete="off" />
    <button id="send-btn" class="icon-btn" onclick="send()">↑</button>
  </div>

  <div id="toast"></div>
  <div id="cart-overlay" onclick="closeCartPanel()"></div>
  <div id="cart-bar" onclick="openCartPanel()">
    <div class="cart-bar-left">
      <div class="cart-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-count-badge" id="cart-count">0</span>
      </div>
      <span class="cart-total" id="cart-total">¥0</span>
    </div>
    <span class="cart-arrow">▸</span>
  </div>
  <div id="cart-panel">
    <div class="panel-header">
      <span class="panel-title">购物车</span>
      <button class="panel-close" onclick="closeCartPanel()" aria-label="关闭购物车">✕</button>
    </div>
    <div class="panel-list" id="cart-list">
      <div class="panel-empty">购物车是空的<br><span style="font-size:12px;color:#ccc;margin-top:4px;display:inline-block">去挑选喜欢的商品吧</span></div>
    </div>
    <div class="panel-footer">
      <button class="btn-clear" onclick="clearCart()">清空</button>
      <button class="btn-copy" onclick="copyOrderText()">📋 复制</button>
      <button class="btn-checkout" onclick="checkout()" id="btn-checkout-text">去结算</button>
    </div>
  </div>

  <div id="order-overlay" onclick="closeOrder(event)">
    <div id="order-modal" onclick="event.stopPropagation()"></div>
  </div>

  <div id="orders-overlay" class="cart-overlay-style" onclick="closeOrders()" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100">
    <div onclick="event.stopPropagation()" style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;max-height:70vh;background:white;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:slideUp 0.3s ease">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid #e8e8e8;flex-shrink:0">
        <span style="font-size:17px;font-weight:700">我的订单</span>
        <button onclick="closeOrders()" style="width:28px;height:28px;border-radius:50%;border:none;background:#f5f5f5;font-size:18px;cursor:pointer;color:#999">✕</button>
      </div>
      <div id="orders-list" style="flex:1;overflow-y:auto;padding:8px 20px"></div>
    </div>
  </div>
</div>

<script>
const BASE = '/api';
const sessionId = 'mobile-' + Date.now();

// ---- HTML escape helper ----
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ---- Reliable scroll-to-bottom ----
function scrollToBottom() {
  const chat = document.getElementById('chat');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      chat.scrollTop = chat.scrollHeight;
    });
  });
}

// ---- SVG Icon helper ----
function getCategoryIcon(category) {
  // Chinese category → icon key mapping
  const categoryMap = {
    '面包类': 'bread', '面团类': 'bread',
    '茶饮类': 'tea', '现场冲泡茶饮': 'tea',
    '零食类': 'biscuit',
    '文玩类': 'craft', '香囊类': 'craft', '耗材类': 'craft', '礼盒套餐': 'craft',
  };
  const iconKey = categoryMap[category] || 'default';

  const icons = {
    tea: {
      bg: '#eaf5ed',

// ---- CartStore (in-memory, clears on refresh) ----
const CartStore = (() => {
  let _items = [];

  function _notify() {
    renderCart();
    // Update all stepper UIs — use data-sku-raw to match CartStore's raw sku_id
    document.querySelectorAll('.stepper-qty').forEach(el => {
      const sku = el.getAttribute('data-sku-raw') || el.id.replace('qty-', '');
      const item = _items.find(i => i.sku_id === sku);
      const qty = item ? item.quantity : 0;
      el.textContent = qty;
      el.style.opacity = qty > 0 ? '1' : '0.3';
    });
    document.querySelectorAll('.rec-card').forEach(card => {
      const product = findProductOnPage(card.getAttribute('data-sku') || '');
      const realSku = product ? product.sku_id : null;
      const item = realSku ? _items.find(i => i.sku_id === realSku) : null;
      const minusBtn = card.querySelector('.stepper-btn:first-child');
      if (minusBtn) minusBtn.disabled = !item || item.quantity < 1;
    });
  }

  return {
    getAll() { return _items; },
    get(skuId) { return _items.find(i => i.sku_id === skuId) || null; },

    add(product) {
      const existing = _items.find(i => i.sku_id === product.sku_id);
      if (existing) {
        existing.quantity = Math.min(99, existing.quantity + 1);
      } else {
        _items.push({
          sku_id: product.sku_id,
          name: product.name,
          category: product.category || '',
          ingredients: product.ingredients || '',
          price: product.price || 0,
          quantity: 1,
          youzan_item_id: product.youzan_item_id || ''
        });
      }
      _notify();
    },

    remove(skuId) {
      _items = _items.filter(i => i.sku_id !== skuId);
      _notify();
    },

    setQuantity(skuId, qty) {
      if (qty < 1) { this.remove(skuId); return; }
      qty = Math.min(99, qty);
      const item = _items.find(i => i.sku_id === skuId);
      if (item) { item.quantity = qty; _notify(); }
    },

    count() { return _items.reduce((sum, i) => sum + i.quantity, 0); },
    total() { return _items.reduce((sum, i) => sum + Math.round((i.price || 0) * i.quantity * 100) / 100, 0); },
    clear() { _items = []; _notify(); }
  };
})();

// ---- Voice input (push-to-talk, WeChat-style) ----
let recognition = null;
let voiceActive = false;
let voiceText = '';

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('mic-btn').style.display = 'none';
    return;
  }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    voiceText = '';
    for (let i = 0; i < e.results.length; i++) {
      voiceText += e.results[i][0].transcript;
    }
    document.getElementById('msg-input').value = voiceText;
    document.getElementById('voice-hint').textContent =
      e.results[0]?.isFinal ? '说完松手发送' : '正在聆听...';
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      document.getElementById('voice-hint').textContent = '未检测到声音，再试试';
      return;
    }
    if (e.error === 'aborted') return;
    stopVoice();
  };

  recognition.onend = () => {
    if (voiceActive) {
      document.getElementById('voice-hint').textContent = voiceText ? '说完松手发送' : '正在聆听...';
    }
  };

  // Bind press-and-hold
  const mic = document.getElementById('mic-btn');
  mic.addEventListener('pointerdown', (e) => { e.preventDefault(); startVoice(); });
  mic.addEventListener('pointerup', () => { if (voiceActive) stopVoiceAndSend(); });
  mic.addEventListener('pointerleave', () => { if (voiceActive) stopVoice(); });
  mic.addEventListener('pointercancel', () => { if (voiceActive) stopVoice(); });
}

function startVoice() {
  if (!recognition) return;
  voiceActive = true;
  voiceText = '';
  const input = document.getElementById('msg-input');
  input.value = '';
  input.placeholder = '正在聆听...';
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('voice-overlay').classList.add('show');
  document.getElementById('voice-hint').textContent = '正在聆听...';
  try { recognition.start(); } catch(ex) {}
}

function stopVoice() {
  voiceActive = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('voice-overlay').classList.remove('show');
  document.getElementById('msg-input').placeholder = '输入你想说的话...';
  try { recognition.stop(); } catch(ex) {}
}

function stopVoiceAndSend() {
  stopVoice();
  setTimeout(() => {
    const txt = document.getElementById('msg-input').value.trim() || voiceText;
    if (txt) {
      document.getElementById('msg-input').value = txt;
      send();
    }
  }, 300);
}

async function sendMessage(message) {
  showLoading();
  document.getElementById('send-btn').disabled = true;
  try {
    const resp = await fetch(BASE + '/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message })
    });
    const data = await resp.json();
    hideLoading();
    addMsg('bot', data.message);
    if (data.recommendation) showRecommendation(data.recommendation);
    // catalog can be an array (stage-based) or object with .constitution_catalog (show_catalog intent)
    if (data.catalog) {
      const catData = Array.isArray(data.catalog) ? data.catalog : data.catalog.constitution_catalog;
      if (catData) showCatalog(catData);
    }
    setQuickReplies(data.quick_replies);
  } catch(e) {
    hideLoading();
    addMsg('system', '请求失败: ' + e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  addMsg('user', text);
  input.value = '';
  document.getElementById('quick-replies').innerHTML = '';
  sendMessage(text);
}

// ---- Cart UI ----
function stepperChange(btn, skuId, delta) {
  const product = findProductOnPage(skuId);
  if (!product) return;
  const realSku = product.sku_id;
  const item = CartStore.get(realSku);
  const curQty = item ? item.quantity : 0;
  const newQty = curQty + delta;
  if (newQty < 1) {
    CartStore.remove(realSku);
  } else if (newQty <= 99) {
    if (curQty === 0) {
      CartStore.add(product);
    } else {
      CartStore.setQuantity(realSku, newQty);
    }
  }
  // CartStore._notify() handles ALL stepper UI updates including duplicates
}

function findProductOnPage(skuId) {
  const card = document.querySelector('.rec-card[data-sku="' + CSS.escape(skuId) + '"]');
  if (!card) return null;
  try {
    return JSON.parse(decodeURIComponent(card.getAttribute('data-product')));
  } catch(e) {
    return null;
  }
}

function renderCart() {
  const count = CartStore.count();
  const total = CartStore.total();
  const bar = document.getElementById('cart-bar');
  const countBadge = document.getElementById('cart-count');
  const totalEl = document.getElementById('cart-total');

  countBadge.textContent = count;
  totalEl.textContent = '¥' + total.toFixed(2).replace(/\.?0+$/, '');

  // Update checkout button with total
  var checkoutBtn = document.getElementById('btn-checkout-text');
  if (checkoutBtn) {
    checkoutBtn.textContent = count > 0 ? '去结算 ¥' + total.toFixed(2).replace(/\.?0+$/, '') : '去结算';
  }

  if (count > 0 && !bar.classList.contains('panel-open')) {
    const inputBar = document.getElementById('input-bar');
    bar.style.bottom = (inputBar.offsetHeight + 4) + 'px';
    bar.classList.add('show');
    requestAnimationFrame(() => {
      document.getElementById('chat').style.paddingBottom = (bar.offsetHeight + 12) + 'px';
    });
  } else if (count === 0) {
    bar.classList.remove('show');
    bar.classList.remove('panel-open');
    bar.style.bottom = '';
    document.getElementById('chat').style.paddingBottom = '';
  }

  if (document.getElementById('cart-panel').classList.contains('show')) {
    renderCartPanel();
  }
}

  const items = CartStore.getAll();
  if (!items.length) { showToast('购物车是空的'); return; }
  let text = '-- 焙草集 选购清单 --\n';
  let total = 0;
  let count = 0;
  items.forEach(i => {
    const lineTotal = Math.round(i.price * i.quantity * 100) / 100;
    text += i.name + ' x' + i.quantity + '  ¥' + i.price + '  ¥' + lineTotal + '\n';
    total += lineTotal;
    count += i.quantity;
  });
  text += '---\n';
  text += '合计: ' + count + ' 件  ¥' + Math.round(total * 100) / 100;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制选购清单 ✓')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  // WeChat requires the element to be in-viewport for execCommand('copy')
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast('已复制选购清单 ✓'); } catch(e) { showToast('复制失败，请截图'); }
  document.body.removeChild(ta);
}

      return '<div style="background:#faf7f2;border-radius:12px;padding:14px;margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:8px">' +
        '<span style="font-size:12px;color:#999">' + o.time + '</span>' +
        '<span style="font-size:12px;font-weight:600">订单号: ' + o.order_no + '</span>' +
        '</div>' +
        itemsHtml +
        '<div style="border-top:1px solid #e0d8cc;margin-top:8px;padding-top:6px;display:flex;justify-content:space-between;font-weight:700">' +
        '<span>' + o.count + ' 件</span>' +
        '<span style="color:#c0392b">¥' + o.total + '</span>' +
        '</div>' +
        '</div>';
    }).join('');
  }
  document.getElementById('orders-overlay').style.display = 'block';
}

function closeOrders() {
  document.getElementById('orders-overlay').style.display = 'none';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ---- Quick buy & Checkout ----
function quickBuy(skuId) {
  const prod = findProductOnPage(skuId);
  if (!prod) return;
  CartStore.add(prod);
  // CartStore._notify() handles stepper update
  checkout();
}

function checkout() {
  const items = CartStore.getAll();
  if (!items.length) { showToast('购物车是空的'); return; }
  closeCartPanel();

  let total = 0, count = 0;
  let itemsHtml = '';
  items.forEach(i => {
    const lineTotal = Math.round(i.price * i.quantity * 100) / 100;
    itemsHtml += '<div class="order-item"><span>' + i.name + ' × ' + i.quantity + '</span><span>¥' + lineTotal + '</span></div>';
    total += lineTotal;
    count += i.quantity;
  });

  const orderNo = 'BCJ' + Date.now().toString(36).toUpperCase();
  const now = new Date();
  const timeStr = now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate() + ' ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  const html =
    '<div class="order-header">' +
    '<div class="order-check">✓</div>' +
    '<div class="order-title">订单确认</div>' +
    '<div class="order-no">订单号: ' + orderNo + ' ｜ ' + timeStr + '</div>' +
    '</div>' +
    '<div class="order-section">' +
    '<div class="order-section-title">商品明细</div>' +
    itemsHtml +
    '<div class="order-total-row"><span>合计</span><span class="total-price">' + count + ' 件 共 ¥' + total + '</span></div>' +
    '</div>' +
    '<div class="order-section" style="font-size:13px;color:#999">' +
    '<p>📍 取货方式：到店自取</p>' +
    '<p>🏪 门店地址：焙草集门店</p>' +
    '<p style="margin-top:4px;font-size:11px;color:#bbb">此为模拟订单，实际支付将对接有赞</p>' +
    '</div>' +
    '<div class="order-actions">' +
    '<button class="btn-order-close" onclick="closeOrder()">继续选购</button>' +
    '<button class="btn-order-confirm" onclick="confirmOrder(\'' + orderNo + '\')">确认下单</button>' +
    '</div>';

  document.getElementById('order-modal').innerHTML = html;
  document.getElementById('order-overlay').classList.add('show');
}

function closeOrder(e) {
  if (e && e.target !== document.getElementById('order-overlay')) return;
  document.getElementById('order-overlay').classList.remove('show');
  renderCart();
}

async function confirmOrder(orderNo) {
  const items = CartStore.getAll();
  const total = CartStore.total();
  const count = CartStore.count();
  try {
    await fetch(BASE + '/chat/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        order_no: orderNo,
        session_id: sessionId,
        items: items.map(i => ({ sku_id: i.sku_id, name: i.name, price: i.price, quantity: i.quantity, category: i.category })),
        total,
        count
      })
    });
  } catch(e) { /* non-blocking */ }
  OrderStore.add(orderNo, items, total, count);
  CartStore.clear();
  document.getElementById('order-overlay').classList.remove('show');

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = '✅ 下单成功！<br>订单号: ' + escapeHtml(orderNo) + '<br><span style="font-size:11px;color:#999">请到店出示订单号取货</span>';
  chat.appendChild(div);
  scrollToBottom();

  showToast('下单成功 ✓');
}

// ---- Init ----
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

// Event delegation for dynamically-created product card buttons
document.getElementById('chat').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  e.stopPropagation();
  const action = btn.getAttribute('data-action');
  const sku = btn.getAttribute('data-sku');
  if (action === 'dec') stepperChange(btn, sku, -1);
  else if (action === 'inc') stepperChange(btn, sku, 1);
  else if (action === 'quickbuy') { quickBuy(sku); }
  else if (action === 'report') { location.href = BASE.replace('/api','') + '/api/report/' + sessionId; }
});

// Event delegation for cart panel buttons
document.getElementById('cart-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  e.stopPropagation();
  const action = btn.getAttribute('data-action');
  const sku = btn.getAttribute('data-sku');
  // Find real sku_id from the CartStore item
  const items = CartStore.getAll();
  const item = items.find(i => escapeHtml(i.sku_id) === sku);
  if (!item) return;
  const realSku = item.sku_id;
  if (action === 'cart-dec') cartPanelQty(realSku, item.quantity - 1);
  else if (action === 'cart-inc') cartPanelQty(realSku, item.quantity + 1);
  else if (action === 'cart-del') cartPanelQty(realSku, 0);
});
// ---- OrderStore (in-memory, clears on refresh) ----
const OrderStore = {
  _orders: [],

  add(orderNo, items, total, count) {
    this._orders.unshift({
      order_no: orderNo,
      items: items.map(i => ({name:i.name, price:i.price, quantity:i.quantity})),
      total, count,
      time: new Date().toLocaleString('zh-CN')
    });
    document.getElementById('orders-btn').style.display = 'inline-block';
  },

  getAll() { return this._orders; }
};

// Cart starts empty on every page load

// Start conversation
addMsg('bot', '正在连接...');
fetch(BASE + '/chat/send', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ session_id: sessionId, message: '' })
}).then(r => r.json()).then(data => {
  document.getElementById('chat').innerHTML = '';
  addMsg('bot', data.message);
  setQuickReplies(data.quick_replies);
});
</script>
